name: CI
on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20' # Current LTS
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint & Type-check
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Run Tests
        run: npm test

      - name: Production Build Check
        run: npm run build
